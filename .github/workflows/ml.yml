name: MLOps Automation Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  train-and-deploy-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Pull Data from S3 via DVC
        run: |
          dvc init --no-scm
          dvc remote add -d s3remote s3://mlops-student-performance
          dvc pull data/student_dataset.csv.dvc

      - name: Run DVC Pipeline (Trains Model)
        run: dvc repro --force

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: nathanirahul
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: nathanirahul/student-performance-app:latest
